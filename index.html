<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#0f0f12" />
    <meta name="description" content="Listen to free bhajans" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-title" content="Madhu Bhajan" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <title>Madhu Bhajan</title>
    <link rel="manifest" href="/manifest.json" />
    <link rel="icon" href="/icons/icon-192.svg" type="image/svg+xml" />
    <link rel="apple-touch-icon" href="/icons/icon-192.svg" />
    <link rel="stylesheet" href="css/style.css" />
  </head>
  <body>
    <div class="app">
      <header>
        <h1>Madhu Bhajan</h1>
        <p>3 free bhajans · log in to listen</p>
      </header>

      <section id="login-section" class="card">
        <h2>Login</h2>

        <div id="logged-out-view">
          <p class="hint">Sign in with Google (recommended, no SMS cost).</p>
          <button type="button" id="google-login-btn" class="btn-google">
            Continue with Google
          </button>

          <button type="button" id="toggle-phone-login" class="link-btn">
            Use mobile number instead
          </button>

          <div id="phone-backup-section" class="phone-backup hidden">
            <p class="hint phone-hint">
              Backup only — SMS may cost money. Enter 10-digit mobile number.
            </p>
            <input
              id="phone-input"
              type="tel"
              inputmode="numeric"
              placeholder="10-digit mobile number"
              autocomplete="tel"
            />
            <div id="otp-section" class="otp-section hidden">
              <input
                id="otp-input"
                type="text"
                inputmode="numeric"
                maxlength="6"
                placeholder="6-digit OTP"
                autocomplete="one-time-code"
              />
            </div>
            <div id="recaptcha-container"></div>
            <button type="button" id="login-btn">Send OTP</button>
          </div>
        </div>

        <button type="button" id="logout-btn" class="secondary hidden">
          Log out
        </button>
        <p id="user-status" class="hidden" role="status"></p>
      </section>

      <section id="player-section" class="card">
        <h2>Free songs</h2>
        <ul id="song-list" class="song-list"></ul>
        <p id="now-playing" class="now-playing">Log in, then pick a song.</p>
        <audio id="audio-player" controls preload="none"></audio>
      </section>

      <button type="button" id="install-app-btn" class="install-btn hidden">
        Install app
      </button>

      <footer>Madhu Bhajan · MVP</footer>
    </div>

    <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-firestore-compat.js"></script>
    <script src="js/firebase-config.js"></script>
    <script src="js/firestore.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/app.js"></script>
    <script src="js/pwa.js"></script>
  </body>
</html>
