<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#0f0f12" />
    <meta name="description" content="Simple music player PWA" />
    <title>Madhu Bhajan</title>
    <link rel="stylesheet" href="css/style.css" />
  </head>
  <body>
    <div class="app">
      <header>
        <h1>Madhu Bhajan</h1>
        <p>3 free bhajans · log in to listen</p>
      </header>

      <section id="login-section" class="card">
        <h2>Login</h2>
        <p class="hint">
          Enter your 10-digit mobile number. We send a 6-digit code by SMS.
        </p>
        <input
          id="phone-input"
          type="tel"
          inputmode="numeric"
          placeholder="10-digit mobile number"
          autocomplete="tel"
        />
        <div id="otp-section" class="otp-section hidden">
          <input
            id="otp-input"
            type="text"
            inputmode="numeric"
            maxlength="6"
            placeholder="6-digit OTP"
            autocomplete="one-time-code"
          />
        </div>
        <div id="recaptcha-container"></div>
        <button type="button" id="login-btn">Send OTP</button>
        <button type="button" id="logout-btn" class="secondary hidden">
          Log out
        </button>
        <p id="user-status" class="hidden" role="status"></p>
      </section>

      <section id="player-section" class="card">
        <h2>Free songs</h2>
        <ul id="song-list" class="song-list"></ul>
        <p id="now-playing" class="now-playing">Log in, then pick a song.</p>
        <audio id="audio-player" controls preload="none"></audio>
      </section>

      <footer>Madhu Bhajan · MVP</footer>
    </div>

    <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-auth-compat.js"></script>
    <script src="js/firebase-config.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/app.js"></script>
  </body>
</html>
